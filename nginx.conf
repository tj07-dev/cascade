events { worker_connections 1024; }

http {
  # Docker's embedded DNS (127.0.0.11) re-resolves "app" on every deploy.
  # A static upstream block caches the old container IP forever and breaks
  # after the app container is recreated, so resolve it per-connection instead.
  resolver 127.0.0.11 valid=10s;

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name cascade.tjdev.in;

    ssl_certificate     /etc/letsencrypt/live/cascade.tjdev.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cascade.tjdev.in/privkey.pem;

    # Disable buffering for download streams
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    set $app_upstream app:3000;

    location / {
      proxy_pass http://$app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
