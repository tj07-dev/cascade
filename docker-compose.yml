services:
  app:
    image: 477483854563.dkr.ecr.ap-south-1.amazonaws.com/cascade:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - YTDLP_POT_PROVIDER_URL=http://bgutil-provider:4416
    volumes:
      - ./cookies:/app/cookies:ro
    depends_on:
      - bgutil-provider
    networks:
      - web

  # Generates YouTube PO tokens so yt-dlp can authenticate as a real browser
  # without needing a logged-in account's cookies.
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    init: true
    restart: unless-stopped
    networks:
      - web

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge
