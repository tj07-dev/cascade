services:
  app:
    image: 477483854563.dkr.ecr.ap-south-1.amazonaws.com/cascade:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./cookies:/app/cookies:ro
    networks:
      - web

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    driver: bridge
